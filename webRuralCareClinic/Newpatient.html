<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Patient</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{margin:0;font-family:Arial;background:#e5e5e5;}
.topbar{background:#0fb14a;padding:15px;display:flex;align-items:center;}
.logo{width:70px;height:70px;background:white;border-radius:50%;display:flex;justify-content:center;align-items:center;margin-right:15px;}
.logo i{color:#0fb14a;font-size:35px;}
.title-box{background:#4a86c5;color:white;padding:10px 20px;border-radius:5px;display:flex;justify-content:space-between;align-items:center;width:100%;}
.title-left h2{margin:0;}
.title-left p{margin:0;font-size:12px;}
.lang{background:#2e6fb3;color:white;padding:6px 12px;border-radius:20px;font-size:12px;}
.container{display:flex;}
.sidebar{width:220px;background:#f5f5f5;padding:15px;height:100vh;}
.sidebar a{display:block;padding:10px;color:#2a5bd7;text-decoration:none;}
.sidebar a:hover{background:#ddd;}
.quick{margin-top:30px;font-size:14px;}
.main{flex:1;padding:30px;}
.header-title{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.header-title h1{margin:0;}
.back{color:black;text-decoration:none;font-size:14px;}
.form-box{background:white;padding:25px;border-radius:10px;}
.progress{height:6px;background:#ddd;border-radius:10px;margin-bottom:20px;overflow:hidden;}
.progress-bar{width:60%;height:100%;background:#4a86c5;}
.section-title{color:#4a86c5;font-size:18px;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.form-row{display:flex;gap:20px;margin-bottom:15px;}
.form-group{flex:1;}
label{display:block;margin-bottom:5px;font-size:14px;}
input,select{width:100%;padding:10px;border-radius:5px;border:1px solid #ccc;}
button{margin-top:20px;width:100%;padding:12px;background:#1b6ea8;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo"><i class="fa-solid fa-plus"></i></div>
    <div class="title-box">
        <div class="title-left">
            <h2>Rural Care Clinic</h2>
            <p>Digital Patient Check-in System</p>
        </div>
        <div class="lang">English</div>
    </div>
</div>

<div class="container">

<div class="sidebar">
  <a href="unknown.html"><i class="fa-solid fa-house"></i> Dashboard</a>
    <a href="newpatient.html"><i class="fa-solid fa-user-plus"></i> New patient</a>
    <a href="checkin.html"><i class="fa-solid fa-repeat"></i> Returning patient</a>
    <a href="today'squeue.html"><i class="fa-solid fa-list"></i> Today’s queue</a>
    <a href="report.html"><i class="fa-solid fa-chart-bar"></i> Reports</a>
    <a href="settings.html"><i class="fa-solid fa-gear"></i> Setting</a>
    <div class="quick">
        <p><b>Quick Stats</b></p>
        <p>Patients Today: <span style="color:blue">47</span></p>
        <p>In Queue: <span style="color:orange">12</span></p>
        <p>Avg Wait: <span style="color:green">25 min</span></p>
    </div>
</div>

<div class="main">

<div class="header-title">
    <a href="index.html" class="back"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <h1>Register New Patient</h1>
</div>

<div class="form-box">

<div class="progress"><div class="progress-bar"></div></div>

<div class="section-title"><i class="fa-regular fa-user"></i> Personal Information</div>

<div class="form-row">
    <div class="form-group">
        <label>First Name *</label>
        <input placeholder="Enter first name">
    </div>
    <div class="form-group">
        <label>Last Name *</label>
        <input placeholder="Enter last name">
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Date of Birth *</label>
        <input placeholder="dd/mm/yy">
    </div>
    <div class="form-group">
        <label>Gender *</label>
        <select>
            <option>Female</option>
            <option>Male</option>
        </select>
    </div>
</div>

<div class="section-title"><i class="fa-solid fa-phone"></i> Contact Information</div>

<div class="form-row">
    <div class="form-group">
        <label>Phone Number *</label>
        <input placeholder="+250 788 xxx xxx">
    </div>
    <div class="form-group">
        <label>Address *</label>
        <input placeholder="Village, district">
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Emergency Contact Name *</label>
        <input placeholder="Enter contact name">
    </div>
    <div class="form-group">
        <label>Emergency Contact Phone *</label>
        <input placeholder="+250 788 xxx xxx">
    </div>
</div>

<button onclick="location.href='Todayqueue.html'">Next: Visit Details</button>

</div>

</div>
</div>

</body>
</html>
