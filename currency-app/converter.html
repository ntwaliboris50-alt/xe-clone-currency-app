<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chris$Boris Current Change</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <img src="assets/mm.png" width="80" height="80" alt="Logo">
 <h1>chris$Boris CURRENT CHANGE</h1>
</header>
<nav>
    <a href="index.html">HOME</a>
    <a href="converter.html" class="active">FULL CONVERTER</a>
    <a href="details.html">CURRENCY DETAILS</a>
    <a href="history.html">HISTORY</a>
    <a href="setting.html">SETTING</a>
</nav>
<main>
    <div class="converter-card">
        <div class="input-group">
            <label>Amount</label>
            <input type="number" id="amountInput" placeholder="0.00" value="100">
        </div>
        <div class="dual-input">
            <div class="input-group half">
                <label>From</label>
                <input type="text" id="searchFrom" placeholder="Search currency..." class="search-input">
                <select id="fromCurrency" size="5" class="currency-select">
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                    <option value="RWF">RWF - Rwandan Franc</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="CHF">CHF - Swiss Franc</option>
                    <option value="CNY">CNY - Chinese Yuan</option>
                    <option value="INR">INR - Indian Rupee</option>
                    <option value="UGX">UGX - Ugandan Shilling</option>
                    <option value="CDF">CDF - Congolese Franc</option>
                </select>
            </div>
            <div class="swap-btn-container">
                <button class="swap-btn" onclick="swapCurrencies()">SWAP</button>
            </div>
            <div class="input-group half">
                <label>To</label>
                <input type="text" id="searchTo" placeholder="Search currency..." class="search-input">
                <select id="toCurrency" size="5" class="currency-select">
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR" selected>EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                    <option value="RWF">RWF - Rwandan Franc</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="CHF">CHF - Swiss Franc</option>
                    <option value="CNY">CNY - Chinese Yuan</option>
                    <option value="INR">INR - Indian Rupee</option>
                    <option value="UGX">UGX - Ugandan Shilling</option>
                    <option value="CDF">CDF - Congolese Franc</option>
                </select>
            </div>
        </div>
        <button class="convert-btn" onclick="performConversion()">CONVERT NOW</button>
        <div class="result-area">
            <div class="result-box">
                <div class="result-amount" id="resultAmount">—</div>
                <div class="result-rate" id="resultRate">—</div>
                <div class="result-time" id="resultTime">—</div>
            </div>
        </div>
    </div>
</main>
<footer>
    <div class="footer-content">
        <p>&copy; 2026 chris$Boris Current Change.</p>
        <p>Email: chris$Boriscurrentchange@gmail.com | Phone: 0788888888</p>
    </div>
</footer>
<script src="js/script.js"></script>
</body>
</html>
